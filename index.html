<script type="text/plain" id="app-source">

const APPROVERS = [

];

/* ── EmailJS Init ── */
(function initEmailJS() {
  const key = "Fq3I6k806Lj82-huC";
  if (typeof emailjs !== "undefined") {
    emailjs.init(key);
    console.log("EmailJS initialized OK");
  } else {
    console.error("EmailJS not loaded!");
  }
})();

/* ── Storage (JSONBin.io - shared cloud) ── */
const JSONBIN_KEY = "$2a$10$vZ7VMUUZqAKtlQ9fqrBcmOIICIFZSZqb29oK445wVRcbZ9m/FNqKW";
const JSONBIN_BASE = "https://api.jsonbin.io/v3";

async function getBin(binId) {
  const res = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
    headers: { "X-Master-Key": JSONBIN_KEY }
  });
  if (!res.ok) throw new Error(`取得失敗 (${res.status})`);
  const data = await res.json();
  return data.record;
}

async function updateBin(binId, data) {
  const res = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(`更新失敗 (${res.status})`);
}

async function createBin(data, name) {
  const res = await fetch(`${JSONBIN_BASE}/b`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": JSONBIN_KEY,
      "X-Bin-Name": name,
      "X-Bin-Private": "false"
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(`作成失敗 (${res.status})`);
  const json = await res.json();
  return json.metadata.id;
}

// localStorage fallback for settings only
const store = {
  get: (key) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
};

/* ── Utils ── */
const fmt = (v) => { const n = parseInt(v); return isNaN(n) ? "―" : "¥" + n.toLocaleString(); };

function Badge({ status }) {
  const cls = status === "承認済" ? "badge-approved" : status === "差戻し" ? "badge-returned" : "badge-pending";
  return <span className={`badge ${cls}`}>{status}</span>;
}

function Notify({ msg }) {
  if (!msg) return null;
  return <div className={`notify ${msg.type}`}>{msg.text}</div>;
}

/* ── Email (EmailJS) ── */
async function sendEmailToAll(recipients, subject, body, settings) {
  const sid = settings.emailjsServiceId || "service_64db3nr";
  const tid = settings.emailjsTemplateId || "template_pxbiqdi";
  const key = settings.emailjsPublicKey || "Fq3I6k806Lj82-huC";
  const ccEmails = recipients.map(r => r.email).filter(Boolean).join(",");
  const names = recipients.map(r => r.name).join("、");
  const now = new Date().toLocaleString("ja-JP");
  try {
    emailjs.init(key);
    const result = await emailjs.send(sid, tid, {
      subject: subject,
      message: body,
      cc_emails: ccEmails,
      name: names,
      email: ccEmails,
      time: now
    });
    console.log("EmailJS OK:", result);
    return { ok: recipients.length, fail: [], errors: [] };
  } catch(e) {
    console.error("EmailJS error:", e);
    const errMsg = e.text || e.message || JSON.stringify(e) || String(e);
    return { ok: 0, fail: recipients.map(r => r.name), errors: [errMsg] };
  }
}

function collectRecipients(app, settings) {
  const map = {};
  if (app.applicantEmail) map[app.applicantEmail] = { name: app.applicantName, role: "申請者" };
  (app.staff || []).forEach(s => { if (s.email) map[s.email] = { name: s.name, role: "関係者" }; });
  APPROVERS.forEach(a => { if (settings[a.key]) map[settings[a.key]] = { name: a.name, role: a.role }; });
  return Object.entries(map).map(([email, info]) => ({ email, ...info }));
}

async function sendToAll(recipients, subject, body, settings) {
  if (recipients.length === 0) return { ok: 0, fail: [], errors: [] };
  return await sendEmailToAll(recipients, subject, body, settings);
}

/* ── StaffInput ── */
function StaffInput({ staff, onChange }) {
  const set = (i, k, v) => { const s = [...staff]; s[i] = { ...s[i], [k]: v }; onChange(s); };
  const add = () => onChange([...staff, { name: "", email: "" }]);
  const remove = (i) => { if (staff.length <= 2) return; onChange(staff.filter((_, idx) => idx !== i)); };
  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 40px", gap: "0 8px", marginBottom: 6 }}>
        <span style={{ fontSize: 11, color: "#888" }}>氏名 <span className="req">*</span></span>
        <span style={{ fontSize: 11, color: "#888" }}>メールアドレス（任意・入力で通知あり）</span>
        <span />
      </div>
      {staff.map((s, i) => (
        <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 40px", gap: "0 8px", marginBottom: 8, alignItems: "center" }}>
          <input type="text" placeholder={`関係者${i + 1}の氏名`} value={s.name || ""} onChange={e => set(i, "name", e.target.value)} />
          <input type="email" placeholder="email@example.com" value={s.email || ""} onChange={e => set(i, "email", e.target.value)} />
          {staff.length > 2
            ? <button className="danger" onClick={() => remove(i)} style={{ padding: "6px 8px", fontSize: 12 }}>×</button>
            : <div />}
        </div>
      ))}
      <button onClick={add} style={{ fontSize: 12, padding: "6px 14px", marginTop: 4 }}>＋ 関係者を追加</button>
    </div>
  );
}

/* ── Setup Screen (表示される場合: SHARED_BIN_ID が未設定) ── */
function SetupScreen() {
  const [loading, setLoading] = useState(false);
  const [newBinId, setNewBinId] = useState(null);
  const [error, setError] = useState(null);
  const [copied, setCopied] = useState(false);

  const doCreate = async () => {
    setLoading(true); setError(null);
    try {
      const id = await createBin({ apps: [] }, "klabo-ringi-shared");
      setNewBinId(id);
    } catch(e) {
      setError(e.message || String(e));
    }
    setLoading(false);
  };

  const copy = () => {
    navigator.clipboard.writeText(newBinId);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div className="page">
      <div className="app-header">
        <div>
          <div className="app-title-sub">株式会社ケイラボ</div>
          <div className="app-title" style={{ fontSize: 20 }}>⚙️ 初期設定が必要です</div>
        </div>
      </div>

      <div className="card" style={{ background: "#fff9ec", border: "0.5px solid #e8c97a" }}>
        <div className="card-title" style={{ color: "#854f0b" }}>⚠ 共有ストレージ（BIN ID）が未設定</div>
        <p style={{ fontSize: 13, lineHeight: 1.8, color: "#555" }}>
          このシステムは全員で同じデータを共有するために<strong>共有BIN</strong>を使用します。<br />
          下のボタンを押すと<strong>1回だけ</strong>作成されます。作成後、表示されるIDを index.html に貼り付けてください。
        </p>
      </div>

      {!newBinId && (
        <div className="card" style={{ textAlign: "center", padding: "2rem" }}>
          <button
            className="primary"
            onClick={doCreate}
            disabled={loading}
            style={{ fontSize: 15, padding: "14px 32px" }}
          >
            {loading ? "作成中..." : "🚀 共有ストレージを作成する"}
          </button>
          {error && <p className="err" style={{ marginTop: 16, fontSize: 13 }}>エラー: {error}</p>}
        </div>
      )}

      {newBinId && (
        <>
          <div className="card" style={{ background: "#eaf3de", border: "0.5px solid #97c459" }}>
            <div className="card-title" style={{ color: "#3b6d11" }}>✅ 作成成功！</div>
            <p style={{ fontSize: 13, color: "#555", marginBottom: 12 }}>
              以下のIDをコピーして index.html の <code style={{background:"#fff",padding:"2px 6px",borderRadius:4}}>SHARED_BIN_ID = ""</code> の <code>""</code> の中に貼り付けてください：
            </p>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <input
                type="text"
                value={newBinId}
                readOnly
                style={{ fontFamily: "monospace", fontSize: 14, fontWeight: 600, color: "#1a1a1a", background: "#fff" }}
                onClick={e => e.target.select()}
              />
              <button className="primary" onClick={copy} style={{ flexShrink: 0 }}>
                {copied ? "✓ コピー済" : "📋 コピー"}
              </button>
            </div>
          </div>

          <div className="card">
            <div className="card-title">次の手順</div>
            {[
              { n: 1, t: "GitHubの index.html を編集", d: "https://github.com/korealabo/ringi/blob/main/index.html を開いて、鉛筆アイコンで編集モード" },
              { n: 2, t: "SHARED_BIN_ID を検索", d: "Ctrl+F で「SHARED_BIN_ID」を検索（ファイル上部にあります）" },
              { n: 3, t: "IDを貼り付け", d: <><code style={{background:"#f5f4f0",padding:"2px 6px",borderRadius:4}}>const SHARED_BIN_ID = "";</code> の <code>""</code> の中に上記IDを貼り付け</> },
              { n: 4, t: "コミット", d: "下の「Commit changes」ボタンをクリックして保存" },

              <div key={s.n} className="setup-step">
                <div className="step-num">{s.n}</div>

                  <p style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{s.t}</p>

                </div>
              </div>
            ))}
          </div>
        </>

    </div>
  );
}

/* ── Form ── */
function Form({ onSubmit, onCancel, settings }) {
  const today = new Date().toISOString().split("T")[0];
  const [f, setF] = useState({
    applicationDate: today, applicantName: "", applicantEmail: "", title: "",
    brand: "", amount: "", taxIncluded: "included", content: "",
    costRecovery: "no", costRecoveryDate: "", hasRevenue: "no", revenueAmount: "",
    staff: [{ name: "", email: "" }, { name: "", email: "" }],
  });
  const [errors, setErrors] = useState({});
  const [sending, setSending] = useState(false);
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  const isEmailReady = settings.emailjsServiceId && settings.emailjsTemplateId && settings.emailjsPublicKey;
  const recipientCount = collectRecipients({ ...f, staff: f.staff.filter(s => s.name.trim()) }, settings).length;

  const validate = () => {
    const e = {};
    if (!f.applicantName.trim()) e.applicantName = "起案者名を入力してください";
    if (!f.applicantEmail.trim()) e.applicantEmail = "申請者メールを入力してください";
    if (!f.title.trim()) e.title = "件名を入力してください";
    if (!f.amount) e.amount = "金額を入力してください";
    if (!f.content.trim()) e.content = "申請内容を入力してください";
    if (f.staff.filter(s => s.name.trim()).length < 2) e.staff = "関係者は2名以上入力してください";
    if (f.costRecovery === "yes" && !f.costRecoveryDate) e.costRecoveryDate = "回収予定日を入力してください";
    if (f.hasRevenue === "yes" && !f.revenueAmount) e.revenueAmount = "収益金額を入力してください";
    setErrors(e); return Object.keys(e).length === 0;
  };

  const handleSubmit = async () => {
    if (!validate()) return;
    const app = { ...f, staff: f.staff.filter(s => s.name.trim()), status: "申請中", id: Date.now().toString(), submittedAt: new Date().toISOString() };
    setSending(true);
    const ejs = {
      emailjsServiceId: settings.emailjsServiceId || "service_64db3nr",
      emailjsTemplateId: settings.emailjsTemplateId || "template_pxbiqdi",
      emailjsPublicKey: settings.emailjsPublicKey || "Fq3I6k806Lj82-huC",
    };
    const recs = collectRecipients(app, {
      ...settings,
      yasutakeEmail: settings.yasutakeEmail || "info@korea-labo.com",
      eomEmail: settings.eomEmail || "yumi@korea-labo.com",
    });
    let emailMsg = "";
    if (recs.length > 0) {
      try {
        const {ok, fail, errors} = await sendToAll(recs, `【稟議申請】${app.title}（${app.applicantName}より）`, buildSubmitBody(app), ejs);
        emailMsg = fail.length === 0 ? `✅ ${ok}名全員にメール通知を送信しました！` : `❌ 送信失敗\n${(errors||[]).join("\n")}`;
      } catch(e) {
        emailMsg = "❌ メール送信エラー: " + (e.message || String(e));
      }
    } else {
      emailMsg = "通知先のメールアドレスが未入力です。";
    }
    try {
      await onSubmit(app);
      setSending(false);
      alert(emailMsg + "\n\n✅ クラウドに保存しました。");
    } catch(e) {
      setSending(false);
      alert(emailMsg + "\n\n❌ クラウド保存エラー: " + (e.message || String(e)));
    }
  };

  return (
    <div className="page">
      <div className="app-header">
        <div>
          <div className="app-title-sub">株式会社ケイラボ</div>
          <div className="app-title" style={{ fontSize: 18 }}>新規稟議申請</div>
        </div>
        <button onClick={onCancel}>← 戻る</button>
      </div>

      <div className="card">
        <div className="card-title">基本情報</div>
        <div className="row"><span className="row-label">起案日 <span className="req">*</span></span><input type="date" value={f.applicationDate} onChange={e => set("applicationDate", e.target.value)} style={{ maxWidth: 180 }} /></div>
        <div className="row">
          <span className="row-label">起案者名 <span className="req">*</span></span>
          <div><input type="text" placeholder="例：山田 太郎" value={f.applicantName} onChange={e => set("applicantName", e.target.value)} style={{ maxWidth: 220 }} />{errors.applicantName && <p className="err">{errors.applicantName}</p>}</div>
        </div>
        <div className="row"><span className="row-label">申請者メール <span className="req">*</span></span><div><input type="email" placeholder="your@email.com" value={f.applicantEmail} onChange={e => set("applicantEmail", e.target.value)} style={{ maxWidth: 280 }} />{errors.applicantEmail && <p className="err">{errors.applicantEmail}</p>}</div></div>
        <div className="row">
          <span className="row-label">件名 <span className="req">*</span></span>
          <div><input type="text" placeholder="申請の件名" value={f.title} onChange={e => set("title", e.target.value)} />{errors.title && <p className="err">{errors.title}</p>}</div>
        </div>
        <div className="row"><span className="row-label">関連ブランド</span><input type="text" placeholder="例：Cellfusion C、too cool for school など" value={f.brand} onChange={e => set("brand", e.target.value)} style={{ maxWidth: 320 }} /></div>
        <div className="row">
          <span className="row-label">申請金額 <span className="req">*</span></span>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontSize: 15, color: "#888" }}>¥</span>
                <input type="text" inputMode="numeric" placeholder="0" value={f.amount ? parseInt(f.amount.replace(/,/g,"")).toLocaleString() : ""} onChange={e => { const raw = e.target.value.replace(/,/g,""); if(raw===""||/^\d+$/.test(raw)) set("amount", raw); }} style={{ width: 160 }} />
              </div>
              <span style={{ fontSize: 13, color: "#888" }}>（税込）</span>
            </div>
            {errors.amount && <p className="err">{errors.amount}</p>}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">申請詳細</div>
        <div className="row" style={{ alignItems: "start" }}>
          <span className="row-label">申請内容 <span className="req">*</span></span>
          <div>
            <textarea placeholder="申請の目的・使用用途・詳細を記入してください" value={f.content} onChange={e => set("content", e.target.value)} style={{ width: "100%", minHeight: 100, resize: "vertical" }} />
            {errors.content && <p className="err">{errors.content}</p>}
          </div>
        </div>
        <div className="row">
          <span className="row-label">費用回収</span>
          <div>
            <div style={{ display: "flex", gap: 20, marginBottom: f.costRecovery === "yes" ? 10 : 0 }}>
              {[["no", "回収なし"], ["yes", "回収あり"]].map(([v, l]) => (
                <label key={v} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 13, cursor: "pointer" }}>
                  <input type="radio" name="cr" value={v} checked={f.costRecovery === v} onChange={() => set("costRecovery", v)} /> {l}
                </label>
              ))}
            </div>
            {f.costRecovery === "yes" && <div><label style={{ fontSize: 12, color: "#888", display: "block", marginBottom: 4 }}>費用回収予定日</label><input type="date" value={f.costRecoveryDate} onChange={e => set("costRecoveryDate", e.target.value)} style={{ maxWidth: 180 }} />{errors.costRecoveryDate && <p className="err">{errors.costRecoveryDate}</p>}</div>}
          </div>
        </div>
        <div className="row">
          <span className="row-label">収益見込み</span>
          <div>
            <div style={{ display: "flex", gap: 20, marginBottom: f.hasRevenue === "yes" ? 10 : 0 }}>
              {[["no", "収益なし"], ["yes", "収益あり"]].map(([v, l]) => (
                <label key={v} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 13, cursor: "pointer" }}>
                  <input type="radio" name="rv" value={v} checked={f.hasRevenue === v} onChange={() => set("hasRevenue", v)} /> {l}
                </label>
              ))}
            </div>
            {f.hasRevenue === "yes" && <div><label style={{ fontSize: 12, color: "#888", display: "block", marginBottom: 4 }}>収益見込み金額</label><div style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ fontSize: 15, color: "#888" }}>¥</span><input type="text" inputMode="numeric" placeholder="0" value={f.revenueAmount ? parseInt(f.revenueAmount.replace(/,/g,"")).toLocaleString() : ""} onChange={e => { const raw = e.target.value.replace(/,/g,""); if(raw===""||/^\d+$/.test(raw)) set("revenueAmount", raw); }} style={{ width: 160 }} /></div>{errors.revenueAmount && <p className="err">{errors.revenueAmount}</p>}</div>}
          </div>
        </div>
      </div>

      <div className="card">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
          <div className="card-title" style={{ margin: 0 }}>関係者 <span className="req">*</span></div>
          <span style={{ fontSize: 11, color: "#aaa" }}>2名以上必須</span>
        </div>
        <div style={{ height: "0.5px", background: "#e8e5de", margin: "8px 0" }} />
        <StaffInput staff={f.staff} onChange={v => set("staff", v)} />
        {errors.staff && <p className="err" style={{ marginTop: 8, fontWeight: 600 }}>{errors.staff}</p>}
      </div>

      <div className="card">
        <div className="card-title">決裁者（固定）</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
          {APPROVERS.map(a => (
            <div key={a.name} style={{ background: "#f5f4f0", borderRadius: 8, padding: "10px 18px" }}>
              <p style={{ margin: 0, fontSize: 14, fontWeight: 500 }}>{a.name}</p>
              <p style={{ margin: "2px 0 0", fontSize: 11, color: settings[a.key] ? "#3b6d11" : "#a32d2d" }}>{settings[a.key] || "メール未設定"}</p>
            </div>
          ))}
        </div>
        <div className="recipient-bar">
          ✉ 提出後の通知先：<strong>{recipientCount}名</strong>
          {!isEmailReady && <span style={{ marginLeft: 8, fontSize: 12, color: "#a32d2d" }}>（設定でEmailJSを設定してください）</span>}
          {isEmailReady && recipientCount === 0 && <span style={{ marginLeft: 8, fontSize: 12 }}>（メールアドレスを入力してください）</span>}
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 4 }}>
        <button onClick={onCancel} disabled={sending}>キャンセル</button>
        <button className="primary" onClick={handleSubmit} disabled={sending}>{sending ? "送信中..." : "申請を提出する"}</button>
      </div>
    </div>
  );
}

/* ── Detail ── */
function Detail({ appId, apps, onBack, onUpdate, onDelete, settings }) {
  const app = apps.find(a => a.id === appId);
  const [notify, setNotify] = useState(null);
  const [emailSending, setEmailSending] = useState(false);
  const [pwdModal, setPwdModal] = useState(null);
  const [pwdInput, setPwdInput] = useState("");
  const [pwdError, setPwdError] = useState(false);
  const [commentInput, setCommentInput] = useState("");
  if (!app) { onBack(); return null; }

  const isEmailReady = settings.emailjsServiceId && settings.emailjsTemplateId && settings.emailjsPublicKey;
  const recipients = collectRecipients(app, settings);

  const openPwdModal = (status) => { setPwdModal({ status }); setPwdInput(""); setPwdError(false); setCommentInput(""); };
  const closePwdModal = () => { setPwdModal(null); setPwdInput(""); setPwdError(false); setCommentInput(""); };
  const confirmApproval = async () => {
    if (pwdInput !== APPROVAL_PASSWORD) { setPwdError(true); return; }
    const status = pwdModal.status;
    // 差戻し時はコメント必須
    if (status === "差戻し" && !commentInput.trim()) {
      alert("差戻しの場合は理由（コメント）を入力してください。");
      return;
    }
    const comment = commentInput.trim();
    closePwdModal();
    await handleStatus(status, comment);
  };

  const handleStatus = async (status, comment) => {
    const updated = { ...app, status, decisionComment: comment || "" };
    setEmailSending(true); setNotify(null);
    try {
      await onUpdate(app.id, status, comment || "");
    } catch(e) {
      setNotify({ type: "error", text: "クラウド更新エラー: " + (e.message || String(e)) });
      setEmailSending(false);
      return;
    }
    if (isEmailReady) {
      const recs = collectRecipients(updated, settings);
      if (recs.length > 0) {
        const { ok, fail } = await sendToAll(recs, `【稟議結果】${app.title}が「${status}」になりました`, buildResultBody(updated), settings);
        setNotify(fail.length === 0 ? { type: "success", text: `${ok}名全員に結果通知を送信しました。` } : { type: "error", text: `${ok}名へ送信完了。失敗：${fail.join("、")}` });
      } else {
        setNotify({ type: "info", text: `ステータスを「${status}」に更新しました。` });
      }
    } else {
      setNotify({ type: "info", text: `ステータスを「${status}」に更新しました。（メール通知：EmailJS未設定）` });
    }
    setEmailSending(false);
  };

  const handleResend = async () => {
    if (!isEmailReady) { setNotify({ type: "error", text: "設定でEmailJSを設定してください。" }); return; }
    if (recipients.length === 0) { setNotify({ type: "error", text: "通知先のメールアドレスがありません。" }); return; }
    setEmailSending(true); setNotify(null);
    const { ok, fail } = await sendToAll(recipients, `【稟議申請】${app.title}（${app.applicantName}より）`, buildSubmitBody(app), settings);
    setNotify(fail.length === 0 ? { type: "success", text: `${ok}名全員に再送信しました。` } : { type: "error", text: `${ok}名送信完了。失敗：${fail.join("、")}` });
    setEmailSending(false);
  };

  const handleDelete = async () => {
    const pw = window.prompt("削除パスワードを入力してください");
    if(pw === null) return;
    if(pw !== "6332") { alert("パスワードが違います"); return; }
    if(window.confirm(`「${app.title}」を削除しますか？`)) {
      try {
        await onDelete(app.id);
        onBack();
      } catch(e) {
        alert("削除エラー: " + (e.message || String(e)));
      }
    }
  };

  return (
    <div className="page">
      <div className="app-header" style={{ flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={onBack}>← 一覧へ</button>
          <span style={{ fontSize: 18, fontWeight: 500 }}>稟議書</span>
          <Badge status={app.status} />
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <button onClick={() => downloadPDF(app)}>📄 印刷用PDF</button>
          <button onClick={handleResend} disabled={emailSending}>✉ 全員へ再送信</button>
          <button onClick={handleDelete} style={{ color: "#a32d2d", borderColor: "#f09595" }}>🗑 削除</button>
          {app.status === "申請中" && <>
            <button className="success" onClick={() => openPwdModal("承認済")} disabled={emailSending}>✅ 承認する</button>
            <button className="danger" onClick={() => openPwdModal("差戻し")} disabled={emailSending}>↩ 差戻しする</button>
          </>}
        </div>
      </div>

      {emailSending && <div className="notify info">処理中...</div>}
      {!emailSending && notify && <Notify msg={notify} />}

      {pwdModal && (
        <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:"1rem"}}>
          <div style={{background:"#fff",borderRadius:16,padding:"2rem",width:380,maxWidth:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
            <p style={{fontSize:16,fontWeight:500,marginBottom:6}}>
              {pwdModal.status === "承認済" ? "✅ 承認する" : "↩ 差戻しする"}
            </p>
            <p style={{fontSize:13,color:"#888",marginBottom:16}}>決裁者パスワードを入力してください</p>
            <input
              type="password"
              placeholder="パスワード"
              value={pwdInput}
              onChange={e => { setPwdInput(e.target.value); setPwdError(false); }}
              style={{width:"100%",marginBottom:8}}
              autoFocus
            />
            {pwdError && <p style={{fontSize:12,color:"#a32d2d",marginBottom:8}}>パスワードが違います</p>}

            <div style={{marginTop:16}}>
              <label style={{fontSize:13,color:"#555",display:"block",marginBottom:6,fontWeight:500}}>
                {pwdModal.status === "差戻し" ? (
                  <>差戻し理由 <span className="req">*</span> <span style={{fontSize:11,color:"#a32d2d",fontWeight:400}}>（必須）</span></>
                ) : (
                  <>コメント <span style={{fontSize:11,color:"#aaa",fontWeight:400}}>（任意）</span></>
                )}
              </label>
              <textarea
                placeholder={pwdModal.status === "差戻し"
                  ? "差戻しの理由を入力してください（申請者にメールで通知されます）"
                  : "申請者へのコメントがあれば入力（メールで通知されます）"}
                value={commentInput}
                onChange={e => setCommentInput(e.target.value)}
                style={{width:"100%",minHeight:80,resize:"vertical",fontSize:13}}
              />
              <p style={{fontSize:11,color:"#888",marginTop:4,lineHeight:1.5}}>
                ※ 入力した内容は申請者・関係者全員へのメールに含まれます
              </p>
            </div>

            <div style={{display:"flex",gap:8,marginTop:16}}>
              <button onClick={closePwdModal} style={{flex:1}}>キャンセル</button>
              <button onClick={confirmApproval} className={pwdModal.status === "承認済" ? "success" : "danger"} style={{flex:1}}>
                確認
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-title">基本情報</div>
        <div className="row"><span className="row-label">起案日</span><span>{app.applicationDate}</span></div>
        <div className="row"><span className="row-label">起案者</span><span>{app.applicantName}{app.applicantEmail && <span style={{ fontSize: 12, color: "#888", marginLeft: 8 }}>{app.applicantEmail}</span>}</span></div>
        {app.title && <div className="row"><span className="row-label">件名</span><span style={{ fontWeight: 500 }}>{app.title}</span></div>}
        <div className="row"><span className="row-label">関連ブランド</span><span>{app.brand}</span></div>
        <div className="row"><span className="row-label">申請金額</span><span>{fmt(app.amount)} <span style={{ fontSize: 12, color: "#888" }}>（税込）</span></span></div>
      </div>

      {app.decisionComment && (
        <div className="card" style={{
          background: app.status === "承認済" ? "#eaf3de" : app.status === "差戻し" ? "#fcebeb" : "#f5f4f0",
          border: app.status === "承認済" ? "0.5px solid #97c459" : app.status === "差戻し" ? "0.5px solid #f09595" : "0.5px solid #e0ddd5"
        }}>
          <div className="card-title" style={{
            color: app.status === "承認済" ? "#3b6d11" : app.status === "差戻し" ? "#a32d2d" : "#555",
            borderBottomColor: app.status === "承認済" ? "#c5e09c" : app.status === "差戻し" ? "#f5b8b8" : "#e8e5de"
          }}>
            💬 決裁者からのコメント（{app.status}）
          </div>
          <p style={{ whiteSpace: "pre-wrap", lineHeight: 1.8, fontSize: 14, color: "#333", margin: 0 }}>
            {app.decisionComment}
          </p>
        </div>
      )}

      <div className="card">
        <div className="card-title">申請詳細</div>
        <div className="row" style={{ alignItems: "start" }}><span className="row-label">申請内容</span><span style={{ whiteSpace: "pre-wrap", lineHeight: 1.8 }}>{app.content}</span></div>
        <div className="row"><span className="row-label">費用回収</span><span>{app.costRecovery === "yes" ? `あり（予定日：${app.costRecoveryDate}）` : "なし"}</span></div>
        <div className="row"><span className="row-label">収益見込み</span><span>{app.hasRevenue === "yes" ? `あり（${fmt(app.revenueAmount)}）` : "なし"}</span></div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <div className="card">
          <div className="card-title">関係者</div>
          {(app.staff || []).map((s, i) => {
            const name = s.name || (typeof s === "string" ? s : ""); const email = s.email || "";
            return <div key={i} style={{ marginBottom: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 11, color: "#aaa", minWidth: 20 }}>{i + 1}.</span><span style={{ fontSize: 14 }}>{name}</span></div>
              {email && <p style={{ margin: "2px 0 0 26px", fontSize: 11, color: "#3b6d11" }}>✉ {email}</p>}
            </div>;
          })}
        </div>
        <div className="card">
          <div className="card-title">決裁者</div>
          {APPROVERS.map(a => (
            <div key={a.name} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: "50%", background: "#e6f1fb", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 600, color: "#185fa5", flexShrink: 0 }}>{a.name.charAt(0)}</div>
              <div>
                <p style={{ margin: 0, fontSize: 13, fontWeight: 500 }}>{a.name}</p>
                <p style={{ margin: 0, fontSize: 11, color: settings[a.key] ? "#3b6d11" : "#a32d2d" }}>{settings[a.key] || "メール未設定"}</p>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="recipient-bar">
        ✉ 通知対象：<strong>{recipients.length}名</strong>
        {recipients.length > 0 && <span style={{ marginLeft: 6, fontSize: 12 }}>{recipients.map(r => `${r.name}（${r.role}）`).join(" ・ ")}</span>}
        {recipients.length === 0 && <span style={{ marginLeft: 6, fontSize: 12, color: "#a32d2d" }}>メールアドレスが未登録です</span>}
      </div>
    </div>
  );
}

/* ── List ── */
function List({ apps, onSelect, onNew, onSettings, onDeleteAll, onExport, onRefresh, lastSync, refreshing }) {
  return (
    <div className="page">
      <div className="app-header">
        <div>
          <div className="app-title-sub">株式会社ケイラボ</div>
          <div className="app-title">社内稟議システム</div>
          {lastSync && (
            <div className="sync-status" style={{ marginTop: 4 }}>
              <span className="sync-dot" />
              <span>最終同期: {lastSync}</span>
            </div>
          )}
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button onClick={onRefresh} disabled={refreshing}>{refreshing ? "🔄 更新中..." : "🔄 更新"}</button>
          <button onClick={onSettings}>⚙ 設定</button>
          <button onClick={onExport}>📊 CSV出力</button>
          <button onClick={onDeleteAll} style={{ color: "#a32d2d", borderColor: "#f09595" }}>🗑 全削除</button>
          <button className="primary" onClick={onNew}>＋ 新規申請</button>
        </div>
      </div>
      {apps.length === 0 ? (
        <div style={{ textAlign: "center", padding: "4rem 0", color: "#aaa", fontSize: 14 }}>
          申請書がありません。「新規申請」から作成してください。
        </div>
      ) : (
        apps.map(app => (
          <div key={app.id} className="list-item" onClick={() => onSelect(app.id)}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
                  <Badge status={app.status} />
                  {app.brand && <span style={{ fontSize: 11, color: "#888", border: "0.5px solid #e0ddd5", padding: "2px 8px", borderRadius: 6 }}>{app.brand}</span>}
                  {app.title && <span style={{ fontSize: 13, fontWeight: 500 }}>{app.title}</span>}
                </div>
                <p style={{ fontSize: 12, color: "#aaa", margin: 0 }}>{app.applicantName} ・ {app.applicationDate} ・ {fmt(app.amount)}（税込）</p>
              </div>
              <span style={{ fontSize: 18, color: "#ccc", marginLeft: 12 }}>›</span>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

/* ── CSV Export ── */
function exportCSV(apps) {
  const headers = ["起案日","起案者","申請者メール","件名","関連ブランド","申請金額(税込)","費用回収","回収予定日","収益見込み","収益金額","申請内容","関係者","ステータス","決裁者コメント","提出日時"];
  const rows = apps.map(a => [
    a.applicationDate,
    a.applicantName,
    a.applicantEmail||"",
    a.title||"",
    a.brand||"",
    a.amount||"",
    a.costRecovery==="yes"?"あり":"なし",
    a.costRecovery==="yes"?a.costRecoveryDate:"",
    a.hasRevenue==="yes"?"あり":"なし",
    a.hasRevenue==="yes"?a.revenueAmount:"",
    (a.content||"").replace(/\n/g," "),
    (a.staff||[]).map(s=>s.name||s).join("/"),
    a.status,
    (a.decisionComment||"").replace(/\n/g," "),
    (a.submittedAt||"").split("T")[0]
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(","));
  const bom = "\uFEFF";
  const csv = bom + [headers.join(","), ...rows].join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `稟議一覧_${new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ── App (Root) ── */
function App() {
  // SHARED_BIN_ID 未設定ならセットアップ画面表示
  if (!SHARED_BIN_ID) {
    return <SetupScreen />;
  }

  const [view, setView] = useState("list");
  const [apps, setApps] = useState([]);
  const [selId, setSelId] = useState(null);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [loaded, setLoaded] = useState(false);
  const [loadError, setLoadError] = useState(null);
  const [lastSync, setLastSync] = useState(null);
  const [refreshing, setRefreshing] = useState(false);

  // 初回ロード
  useEffect(() => {
    (async () => {
      const savedSettings = store.get("klabo-ringi-settings");
      if (savedSettings) {
        const merged = { ...DEFAULT_SETTINGS };
        Object.keys(savedSettings).forEach(k => { if (savedSettings[k]) merged[k] = savedSettings[k]; });
        setSettings(merged);
      }
      try {
        const data = await getBin(SHARED_BIN_ID);
        if (data && Array.isArray(data.apps)) setApps(data.apps);
        setLastSync(new Date().toLocaleTimeString("ja-JP"));
      } catch(e) {
        setLoadError("クラウドからのデータ取得に失敗しました: " + (e.message || String(e)));
      }
      setLoaded(true);
    })();
  }, []);

  // ※ 自動更新は無効化（リクエスト節約のため）。最新状態は「🔄 更新」ボタンで取得。

  // 手動更新
  const refreshApps = async () => {
    setRefreshing(true);
    try {
      const data = await getBin(SHARED_BIN_ID);
      if (data && Array.isArray(data.apps)) setApps(data.apps);
      setLastSync(new Date().toLocaleTimeString("ja-JP"));
    } catch(e) {
      alert("更新エラー: " + (e.message || String(e)));
    }
    setRefreshing(false);
  };

  // 最新データを取得してから変更 (レース条件対策)
  const addApp = async (newApp) => {
    const data = await getBin(SHARED_BIN_ID);
    const latest = (data && Array.isArray(data.apps)) ? data.apps : [];
    const newList = [newApp, ...latest];
    await updateBin(SHARED_BIN_ID, { apps: newList });
    setApps(newList);
    setLastSync(new Date().toLocaleTimeString("ja-JP"));
  };

  const updateAppStatus = async (id, status, comment) => {
    const data = await getBin(SHARED_BIN_ID);
    const latest = (data && Array.isArray(data.apps)) ? data.apps : apps;
    const decidedAt = new Date().toISOString();
    const newList = latest.map(a => a.id === id
      ? { ...a, status, decisionComment: comment || "", decidedAt }
      : a
    );
    await updateBin(SHARED_BIN_ID, { apps: newList });
    setApps(newList);
    setLastSync(new Date().toLocaleTimeString("ja-JP"));
  };

  const deleteApp = async (id) => {
    const data = await getBin(SHARED_BIN_ID);
    const latest = (data && Array.isArray(data.apps)) ? data.apps : apps;
    const newList = latest.filter(a => a.id !== id);
    await updateBin(SHARED_BIN_ID, { apps: newList });
    setApps(newList);
    setLastSync(new Date().toLocaleTimeString("ja-JP"));
  };

  const deleteAllApps = async () => {
    await updateBin(SHARED_BIN_ID, { apps: [] });
    setApps([]);
    setLastSync(new Date().toLocaleTimeString("ja-JP"));
  };

  const saveSettings = (s) => {
    setSettings(s);
    store.set("klabo-ringi-settings", s);
    setView("list");
  };

  if (!loaded) return <div style={{ padding: "3rem", textAlign: "center", color: "#aaa", fontSize: 14 }}>読み込み中...</div>;

  if (loadError) return (
    <div className="page">
      <div className="card" style={{ background: "#fcebeb", border: "0.5px solid #f09595" }}>
        <div className="card-title" style={{ color: "#a32d2d" }}>⚠ エラー</div>
        <p style={{ fontSize: 13, color: "#555", lineHeight: 1.8 }}>{loadError}</p>
        <p style={{ fontSize: 12, color: "#888", marginTop: 12 }}>
          SHARED_BIN_ID が正しく設定されているか確認してください。現在の値: <code>{SHARED_BIN_ID}</code>
        </p>
        <button onClick={() => window.location.reload()} style={{ marginTop: 12 }}>再試行</button>
      </div>
    </div>
  );

  if (view === "settings") return <SettingsView settings={settings} onSave={saveSettings} onBack={() => setView("list")} />;

  if (view === "new") return <Form
    settings={settings}
    onCancel={() => setView("list")}
    onSubmit={async (app) => {
      await addApp(app);
      setView("list");
    }}
  />;

  if (view === "detail") return <Detail
    appId={selId}
    apps={apps}
    settings={settings}
    onBack={() => setView("list")}
    onUpdate={updateAppStatus}
    onDelete={deleteApp}
  />;

  return <List
    apps={apps}
    lastSync={lastSync}
    refreshing={refreshing}
    onRefresh={refreshApps}
    onSelect={(id) => { setSelId(id); setView("detail"); }}
    onNew={() => setView("new")}
    onSettings={() => setView("settings")}
    onExport={() => {
      const pw = window.prompt("パスワードを入力してください");
      if(pw === null) return;
      if(pw !== "6332") { alert("パスワードが違います"); return; }
      exportCSV(apps);
    }}
    onDeleteAll={async () => {
      const pw = window.prompt("削除パスワードを入力してください");
      if(pw === null) return;
      if(pw !== "6332") { alert("パスワードが違います"); return; }
      if(window.confirm("全ての申請書を削除しますか？この操作は取り消せません。")) {
        try { await deleteAllApps(); } catch(e) { alert("削除エラー: " + (e.message || String(e))); }
      }
    }}
  />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
window.addEventListener('DOMContentLoaded', function() {
  var code = document.getElementById('app-source').textContent;
  var result = Babel.transform(code, { presets: ['react'], sourceType: 'script' });
  (new Function(result.code))();
});
</script>
</body>
